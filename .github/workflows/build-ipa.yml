name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build app (unsigned)
        run: |
          cd FlipperFAP
          xcodebuild \
            -project FlipperFAP.xcodeproj \
            -scheme FlipperFAP \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=$PWD/build \
            build

      - name: Package as IPA
        run: |
          cd FlipperFAP
          mkdir -p Payload
          cp -r build/FlipperFAP.app Payload/
          zip -r FlipperFAP.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FlipperFAP.ipa
          path: FlipperFAP/FlipperFAP.ipa
          retention-days: 30
