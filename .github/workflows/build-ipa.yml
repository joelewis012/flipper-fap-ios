name: Build iOS IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: |
          cat > FlipperFAP/project.yml << 'EOF'
          name: FlipperFAP
          options:
            bundleIdPrefix: com.joelewis
          targets:
            FlipperFAP:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources:
                - FlipperFAP
              info:
                path: FlipperFAP/Info.plist
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.joelewis.FlipperFAP
                SWIFT_VERSION: "5.0"
          EOF
          cd FlipperFAP && xcodegen generate
      - name: Build
        run: |
          cd FlipperFAP
          xcodebuild -project FlipperFAP.xcodeproj -scheme FlipperFAP -configuration Release -sdk iphoneos -destination "generic/platform=iOS" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CONFIGURATION_BUILD_DIR=$PWD/build build
      - name: Package IPA
        run: |
          cd FlipperFAP
          mkdir -p Payload
          cp -r build/FlipperFAP.app Payload/
          zip -r FlipperFAP.ipa Payload
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FlipperFAP.ipa
          path: FlipperFAP/FlipperFAP.ipa
          retention-days: 30
